services:
  # 1. FastAPI backend
# 1. FastAPI backend
  api:
    build:
      context: ./backend-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api/app:/code/app
      - ./backend-api/uploads:/code/uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://vector_db:6333
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}  
    depends_on:
      - redis
      - vector_db
    # THIS LINE OVERRIDES THE DOCKERFILE AND ENABLES HOT-RELOAD
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # 2. Redis (message broker)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Qdrant (vector database)
  vector_db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 4. Celery worker (background tasks)
  worker:
    build:
      context: ./backend-api
    volumes:
      - ./backend-api/app:/code/app
      - ./backend-api/uploads:/code/uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://vector_db:6333
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - vector_db
    # ADD --concurrency=1 TO THE END OF THIS LINE
    command: celery -A app.worker:celery_app worker --loglevel=info --concurrency=1
    restart: unless-stopped

# 5. Named volume for persistence
volumes:
  qdrant_data: